<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Ajustes específicos para as abas lado a lado no Mobile */
        .admin-tabs {
            display: flex;
            justify-content: space-around;
            background: var(--dark); /* Usa a cor escura do seu CSS */
            padding: 8px;
            gap: 8px;
            position: sticky;
            top: 60px; /* Logo abaixo do header */
            z-index: 900;
        }

        .tab-btn {
            flex: 1; /* Divide o espaço igualmente */
            padding: 10px 5px;
            font-size: 11px;
            background: #444;
            color: #818181;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary); /* Azul padrão do seu site */
            color: var(--white);
            font-weight: bold;
        }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        /* Estilização dos cards dentro do container transparente */
        .admin-card {
            background: var(--white);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 5px solid var(--primary); /* Mesma borda dos cards de técnicos */
        }

        .btn-acao {
            padding: 10px;
            margin-top: 8px;
            font-size: 13px;
        }
        
        .grid-acoes {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Painel Mestre</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="historico.html">📋 Histórico</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div id="login-screen" class="container">
        <h2 style="text-align:center; margin-bottom: 20px;">Acesso Restrito</h2>
        <input type="password" id="admin-pass" placeholder="Senha do Mestre" style="text-align:center;">
        <button onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="panel-content" style="display:none">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="mudarAba('tab-pix', this)">💰 Liberar PIX</button>
            <button class="tab-btn" onclick="mudarAba('tab-galeria', this)">📸 Galeria</button>
            <button class="tab-btn" onclick="mudarAba('tab-colab', this)">👷 Técnicos</button>
        </div>

        <div id="tab-pix" class="admin-section active container">
            <h3 style="text-align:center; margin-bottom: 15px;">Validar Pagamento</h3>
            <p style="font-size: 13px; text-align: center; color: #666;">Insira o código de 4 dígitos gerado pelo sistema do cliente.</p>
            <input type="number" id="input-id" placeholder="Ex: 1234" style="font-size:28px; text-align:center; margin: 20px 0;">
            <button onclick="validarID()" style="background: var(--secondary);">LIBERAR ACESSO ✅</button>
        </div>

        <div id="tab-galeria" class="admin-section container">
            <h3 style="text-align: center; margin-bottom: 15px;">Fotos para Aprovação</h3>
            <div id="lista-pendentes"></div>
        </div>

        <div id="tab-colab" class="admin-section container">
            <h3 style="text-align: center; margin-bottom: 15px;">Gerenciar Equipe</h3>
            <div id="lista-colabs"></div>
        </div>
    </div>

    <script>
        // Mantenha seu link do Cloudflare aqui para funcionar no Termux
        const API = "https://honest-reviewing-polyester-surge.trycloudflare.com"; 

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        function fazerLogin() {
            if(document.getElementById('admin-pass').value === '1234') {
                Swal.fire({ icon: 'success', title: 'Acesso Liberado', timer: 1000, showConfirmButton: false });
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
            } else { 
                Swal.fire('Erro', 'Senha incorreta', 'error'); 
            }
        }

        function mudarAba(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            btn.classList.add('active');
            if(id === 'tab-galeria') carregarPendentes();
            if(id === 'tab-colab') carregarColabs();
        }

        async function validarID() {
            const idInput = document.getElementById('input-id').value;
            if(!idInput) return Swal.fire('Aviso', 'Digite o ID!', 'warning');

            Swal.fire({ title: 'Processando...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API}/api/admin/liberar-por-id`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'bypass-tunnel-reminder': 'true' }, 
                    body: JSON.stringify({ id_visto: idInput }) 
                });

                if(res.ok) {
                    Swal.fire('Liberado!', `Cliente #${idInput} autorizado com sucesso.`, 'success');
                    document.getElementById('input-id').value = "";
                } else {
                    Swal.fire('Erro', 'Este ID não existe ou já foi liberado.', 'error');
                }
            } catch (e) { 
                Swal.fire('Erro', 'O servidor Termux está offline.', 'error'); 
            }
        }

        // ... demais funções de carregarPendentes e carregarColabs mantidas ...
    </script>
</body>
</html>
