<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rápido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header"><span>Painel do Mestre</span></div>
    <div class="container">
        <h2 style="text-align: center;">Validar Código</h2>
        <input type="number" id="codigoInput" placeholder="4 Dígitos" style="font-size: 30px; text-align: center;">
        <button onclick="validarAgora()" style="background: #25d366;">✅ LIBERAR AGORA</button>
        <div id="resultado" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
    </div>

    <script>
        async function validarAgora() {
            const cod = document.getElementById('codigoInput').value;
            const res = await fetch(`http://localhost:3000/api/admin/liberar-por-id`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_visto: cod })
            });
            const resDiv = document.getElementById('resultado');
            if(res.ok) {
                resDiv.innerHTML = `✅ Código #${cod} LIBERADO!`;
                resDiv.style.color = "green";
                document.getElementById('codigoInput').value = "";
            } else {
                resDiv.innerHTML = "❌ Código não encontrado.";
                resDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
