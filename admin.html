<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Painel Mestre</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="historico.html">📋 Histórico</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div id="login-screen" class="container" style="margin-top:50px;">
        <h2 style="text-align:center;">Login Administrativo</h2>
        <input type="password" id="admin-pass" placeholder="Senha" style="text-align:center;">
        <button onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="panel-content" style="display:none">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="mudarAba('tab-pix', this)">💰 Liberar PIX</button>
            <button class="tab-btn" onclick="mudarAba('tab-galeria', this)">📸 Galeria</button>
            <button class="tab-btn" onclick="mudarAba('tab-colab', this)">👷 Técnicos</button>
        </div>

        <div id="tab-pix" class="admin-section active container">
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <h3>Liberar ID do Cliente</h3>
                <input type="number" id="input-id" placeholder="Código de 4 dígitos" style="font-size:24px; text-align:center; margin: 15px 0;">
                <button onclick="validarID()" style="background:#28a745;">LIBERAR AGORA ✅</button>
            </div>
        </div>

        <div id="tab-galeria" class="admin-section container"><div id="lista-pendentes"></div></div>
        <div id="tab-colab" class="admin-section container"><div id="lista-colabs"></div></div>
    </div>

    <script>
        const API = "http://localhost:3000";

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        function fazerLogin() {
            if(document.getElementById('admin-pass').value === '1234') {
                Swal.fire({ icon: 'success', title: 'Acesso Liberado', timer: 1000, showConfirmButton: false });
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
            } else { Swal.fire('Erro', 'Senha incorreta', 'error'); }
        }

        function mudarAba(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            btn.classList.add('active');
            if(id === 'tab-galeria') carregarPendentes();
            if(id === 'tab-colab') carregarColabs();
        }

        async function validarID() {
            const idInput = document.getElementById('input-id').value;
            if(!idInput) return Swal.fire('Aviso', 'Digite o ID!', 'warning');

            Swal.fire({ title: 'Buscando ID...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API}/api/admin/liberar-por-id`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ id_visto: idInput }) 
                });

                if(res.ok) {
                    Swal.fire('Sucesso!', `ID #${idInput} liberado no db.json!`, 'success');
                    document.getElementById('input-id').value = "";
                } else {
                    Swal.fire('Não encontrado', 'Este ID não existe ou já expirou.', 'error');
                }
            } catch (e) { Swal.fire('Erro', 'Servidor Offline', 'error'); }
        }

        async function carregarPendentes() {
            const res = await fetch(`${API}/api/admin/pendentes`);
            const fotos = await res.json();
            document.getElementById('lista-pendentes').innerHTML = fotos.map(f => `
                <div class="admin-card">
                    <img src="${API}/temp/${f}" style="width:100%">
                    <button onclick="decidirFoto('${f}','aprovar')" style="background:green">APROVAR</button>
                    <button onclick="decidirFoto('${f}','deletar')" style="background:red">REJEITAR</button>
                </div>`).join('');
        }

        async function decidirFoto(foto, acao) {
            await fetch(`${API}/api/admin/decidir-foto`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ foto, acao }) });
            carregarPendentes();
        }

        async function carregarColabs() {
            const res = await fetch(`${API}/api/admin/colaboradores`);
            const colabs = await res.json();
            document.getElementById('lista-colabs').innerHTML = colabs.map(c => `
                <div class="admin-card">
                    <b>${c.nome}</b> (${c.funcao})
                    ${!c.aprovado ? `<button onclick="decidirColab('${c.id}','aprovar')">APROVAR NO MAPA</button>` : '<span>✓ Ativo</span>'}
                    <button onclick="decidirColab('${c.id}','deletar')" style="background:red">REMOVER</button>
                </div>`).join('');
        }

        async function decidirColab(id, acao) {
            await fetch(`${API}/api/admin/decidir-colaborador`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, acao }) });
            carregarColabs();
        }
    </script>
</body>
</html>
