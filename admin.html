<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>🔐 Painel Mestre</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" style="font-size:30px; text-align:right; padding-right:20px;">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div id="login-screen" class="container">
        <h2 style="text-align:center">Acesso Admin</h2>
        <input type="password" id="admin-pass" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="panel-content" style="display:none">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="mudarAba('tab-pix', this)">📋 PIX</button>
            <button class="tab-btn" onclick="mudarAba('tab-galeria', this)">📸 GALERIA</button>
            <button class="tab-btn" onclick="mudarAba('tab-colab', this)">👷 COLAB</button>
        </div>

        <div id="tab-pix" class="admin-section active container">
            <input type="number" id="input-id" placeholder="Cód 4 Dígitos">
            <button onclick="validarID()" style="background:var(--secondary)">LIBERAR CLIENTE</button>
        </div>

        <div id="tab-galeria" class="admin-section container">
            <div id="lista-pendentes"></div>
        </div>

        <div id="tab-colab" class="admin-section container">
            <div id="lista-colabs"></div>
        </div>
    </div>

    <script>
        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        function fazerLogin() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
            } else { alert("Senha incorreta!"); }
        }

        function mudarAba(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
            if(id === 'tab-galeria') carregarPendentes();
            if(id === 'tab-colab') carregarColabs();
        }

        async function carregarPendentes() {
            const res = await fetch('http://localhost:3000/api/admin/pendentes');
            const fotos = await res.json();
            document.getElementById('lista-pendentes').innerHTML = fotos.map(f => `
                <div class="admin-card">
                    <img src="http://localhost:3000/temp/${f}">
                    <div class="admin-acoes">
                        <button class="btn-aprovar" onclick="decidir('${f}','aprovar')">✅</button>
                        <button class="btn-excluir" onclick="decidir('${f}','deletar')">❌</button>
                    </div>
                </div>
            `).join('');
        }

        async function decidir(foto, acao) {
            await fetch('http://localhost:3000/api/admin/decidir-foto', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({foto, acao}) });
            carregarPendentes();
        }

        async function validarID() {
            const id = document.getElementById('input-id').value;
            const res = await fetch(`http://localhost:3000/api/admin/liberar-por-id`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id_visto: id}) });
            if(res.ok) alert("Liberado!");
        }

        async function carregarColabs() {
            const res = await fetch('http://localhost:3000/api/admin/colaboradores');
            const col = await res.json();
            document.getElementById('lista-colabs').innerHTML = col.map(c => `<div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:8px;"><b>${c.nome}</b><br>${c.funcao}</div>`).join('');
        }
    </script>
</body>
</html>
