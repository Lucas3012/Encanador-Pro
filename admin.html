<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .foto-item { display: inline-block; margin: 10px; text-align: center; border: 1px solid #ccc; padding: 5px; }
        .btn-del { background: red; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔐 Painel Administrativo</h1>
    <div id="login-box">
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="carregarTudo()">Entrar</button>
    </div>

    <div id="conteudo" style="display:none;">
        <h2>Pedidos Recentes</h2>
        <table id="tabela">
            <thead><tr><th>Data</th><th>Nome</th><th>Serviço</th><th>Ação</th></tr></thead>
            <tbody id="pedidos"></tbody>
        </table>

        <h2>Gerenciar Galeria</h2>
        <div id="galeria-admin"></div>
    </div>

    <script>
        const API_BASE = "https://beijing-liquid-gives-threatening.trycloudflare.com";

        async function carregarTudo() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // Carregar Pedidos
            const resP = await fetch(`${API_BASE}/admin/pedidos?user=${user}&pass=${pass}`);
            if (!resP.ok) return alert("Login Incorreto");
            
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('conteudo').style.display = 'block';

            const pedidos = await resP.json();
            document.getElementById('pedidos').innerHTML = pedidos.reverse().map(p => `
                <tr>
                    <td>${p.data}</td>
                    <td>${p.nome}</td>
                    <td>${p.servico}</td>
                    <td><a href="https://wa.me/55?text=Olá ${p.nome}" target="_blank">WhatsApp</a></td>
                </tr>
            `).join('');

            // Carregar Fotos
            const resF = await fetch(`${API_BASE}/api/fotos`);
            const fotos = await resF.json();
            document.getElementById('galeria-admin').innerHTML = fotos.map(f => `
                <div class="foto-item">
                    <img src="${API_BASE}/galeria/${f}" width="100"><br>
                    <button class="btn-del" onclick="apagarFoto('${f}')">Apagar</button>
                </div>
            `).join('');
        }

        async function apagarFoto(nome) {
            if(!confirm("Apagar foto?")) return;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            await fetch(`${API_BASE}/api/fotos/${nome}?user=${user}&pass=${pass}`, {method: 'DELETE'});
            carregarTudo();
        }
    </script>
</body>
</html>
