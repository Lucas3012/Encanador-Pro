<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .admin-tab { display: none; padding: 15px; }
        .active-tab { display: block; }
        .tab-menu { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding: 10px 0; }
        .tab-btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
        
        .lead-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #25d366; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lead-info b { font-size: 16px; display: block; }
        .lead-info span { font-size: 11px; color: #888; }
        .btn-call { background: #25d366; color: white; padding: 8px 12px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .btn-danger { background: #dc3545; color: white; margin-top: 30px; border-radius: 8px; padding: 12px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body style="background: #f8f9fa;">

    <div class="header">
        <h1 class="logo-centralizado">PAINEL CONTROLE</h1>
    </div>

    <div class="container" style="max-width: 550px;">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('liberacao')">🔑 Liberação</button>
            <button class="tab-btn" onclick="openTab('leads')">📱 Leads</button>
            <button class="tab-btn" onclick="openTab('config')">⚙️ Ajustes</button>
        </div>

        <div id="liberacao" class="admin-tab active-tab">
            <h3>Liberar ID do Pix</h3>
            <input type="number" id="input-id" placeholder="Digite o ID (ex: 1234)" style="font-size: 20px; text-align: center; margin-top: 15px;">
            <button onclick="validarID()" style="background: #28a745; font-size: 18px; font-weight: bold;">LIBERAR ACESSO ✅</button>
        </div>

        <div id="leads" class="admin-tab">
            <h3>Contatos do Chatbot</h3>
            <div id="lista-leads" style="margin-top: 15px;"></div>
            <button class="btn-danger" onclick="limparLeads()">🗑️ APAGAR TODOS OS LEADS</button>
        </div>

        <div id="config" class="admin-tab">
            <h3>Manutenção do Sistema</h3>
            <p style="font-size: 13px; color: #666; margin: 15px 0;">Use estes botões para limpar o banco de dados no final do dia.</p>
            <button class="btn-danger" onclick="limparSessoes()" style="width: 100%;">🗑️ RESETAR TODOS OS IDs (SESSOES)</button>
            <p style="font-size: 11px; color: red; margin-top: 5px;">*Isso impedirá que IDs antigos sejam usados.</p>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000";

        function openTab(name) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active-tab');
            event.currentTarget.classList.add('active');
            if(name === 'leads') carregarLeads();
        }

        async function validarID() {
            const id = document.getElementById('input-id').value;
            if(!id) return;
            const res = await fetch(`${API}/api/admin/liberar-por-id`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_visto: id })
            });
            if(res.ok) {
                Swal.fire('Sucesso', `ID ${id} liberado!`, 'success');
                document.getElementById('input-id').value = '';
            } else {
                Swal.fire('Erro', 'ID não encontrado.', 'error');
            }
        }

        async function carregarLeads() {
            const container = document.getElementById('lista-leads');
            const res = await fetch(`${API}/api/admin/contatos`);
            const leads = await res.json();
            if(leads.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum lead encontrado.</p>";
                return;
            }
            container.innerHTML = leads.reverse().map(l => `
                <div class="lead-card">
                    <div class="lead-info"><b>${l.telefone}</b><span>📅 ${l.data}</span></div>
                    <a href="https://wa.me/55${l.telefone.replace(/\D/g,'')}" class="btn-call">WHATS</a>
                </div>
            `).join('');
        }

        async function limparLeads() {
            const result = await Swal.fire({ title: 'Apagar tudo?', text: "Você perderá todos os telefones!", icon: 'warning', showCancelButton: true });
            if(result.isConfirmed) {
                await fetch(`${API}/api/admin/limpar-leads`, { method: 'POST' });
                carregarLeads();
                Swal.fire('Apagado!', '', 'success');
            }
        }

        async function limparSessoes() {
            const result = await Swal.fire({ title: 'Resetar IDs?', text: "Todos os clientes terão que gerar novos IDs.", icon: 'warning', showCancelButton: true });
            if(result.isConfirmed) {
                await fetch(`${API}/api/admin/limpar-sessoes`, { method: 'POST' });
                Swal.fire('Sistema Resetado!', '', 'success');
            }
        }
    </script>
</body>
</html>
