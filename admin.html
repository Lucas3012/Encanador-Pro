<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <span>Painel de Controle</span>
    </div>
    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="index.html">Sair</a>
    </div>

    <div class="container" id="login">
        <h1>🔐 Login</h1>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">Acessar</button>
    </div>

    <div class="container" id="painel" style="display:none;">
        <h2>🕵️ Moderação de Fotos</h2>
        <div id="pendentes" class="grid"></div>
        <hr>
        <h2>📋 Pedidos Recebidos</h2>
        <table id="lista-pedidos"></table>
    </div>

    <script>
        const API_BASE = "https://herein-analyze-donors-brake.trycloudflare.com";
        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }
        async function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            if(res.ok) { document.getElementById('login').style.display='none'; document.getElementById('painel').style.display='block'; atualizar(); }
        }
        async function atualizar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const resF = await fetch(`${API_BASE}/api/admin/pendentes?user=${u}&pass=${p}`);
            const fotos = await resF.json();
            document.getElementById('pendentes').innerHTML = fotos.map(f => `
                <div class="card">
                    <img src="${API_BASE}/temp_galeria/${f}">
                    <button style="background:green" onclick="decidir('${f}','aprovar')">Sim</button>
                    <button style="background:red" onclick="decidir('${f}','reprovar')">Não</button>
                </div>
            `).join('');

            const resP = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            const ped = await resP.json();
            document.getElementById('lista-pedidos').innerHTML = ped.reverse().map(i => `<tr><td>${i.nome}</td><td><a href="https://wa.me/5573988478170">Ver</a></td></tr>`).join('');
        }
        async function decidir(foto, acao) {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            await fetch(`${API_BASE}/api/admin/decidir`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user, pass, foto, acao }) });
            atualizar();
        }
    </script>
</body>
</html>
