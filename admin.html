<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestor - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <b>🔐 Painel Administrativo</b>
    </div>

    <div id="login-screen" class="container">
        <h2 style="text-align:center; margin-bottom: 20px;">Acesso Restrito</h2>
        <input type="password" id="admin-pass" placeholder="Digite a senha de acesso">
        <button onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="panel-content" style="display:none">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="mudarAba('tab-pix', this)">📋 PEDIDOS</button>
            <button class="tab-btn" onclick="mudarAba('tab-galeria', this)">📸 GALERIA</button>
            <button class="tab-btn" onclick="mudarAba('tab-colab', this)">👷 COLAB</button>
        </div>

        <div id="tab-pix" class="admin-section active container">
            <h3 style="text-align:center; margin-bottom:15px;">Validar Código do Cliente</h3>
            <p style="font-size:14px; text-align:center; color:#666; margin-bottom:10px;">
                Digite os 4 dígitos que o cliente enviou no WhatsApp:
            </p>
            <input type="number" id="input-id" placeholder="Ex: 1234" style="font-size: 24px; text-align: center; letter-spacing: 5px;">
            <button onclick="validarID()" style="background:var(--secondary); margin-top:10px;">✅ LIBERAR FORMULÁRIO</button>
            <div id="res-pix" style="margin-top:15px; text-align:center; font-weight:bold;"></div>
        </div>

        <div id="tab-galeria" class="admin-section container">
            <h3 style="text-align:center; margin-bottom:20px;">Fotos Pendentes</h3>
            <div id="lista-pendentes">
                </div>
        </div>

        <div id="tab-colab" class="admin-section container">
            <h3 style="text-align:center; margin-bottom:20px;">Candidatos (Trabalhe Conosco)</h3>
            <div id="lista-colabs">
                </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://smallest-mario-run-tolerance.trycloudflare.com";

        // 1. Função de Login
        function fazerLogin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === '1234') { // Senha que definimos
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
                carregarPendentes();
                carregarColaboradores();
            } else {
                alert("Senha incorreta!");
            }
        }

        // 2. Troca de Abas
        function mudarAba(abaId, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(abaId).classList.add('active');
            btn.classList.add('active');

            if(abaId === 'tab-galeria') carregarPendentes();
            if(abaId === 'tab-colab') carregarColaboradores();
        }

        // 3. Validar Código de 4 Dígitos
        async function validarID() {
            const idVisto = document.getElementById('input-id').value;
            const resDiv = document.getElementById('res-pix');

            if(idVisto.length !== 4) {
                alert("O código deve ter 4 dígitos!");
                return;
            }

            const res = await fetch(`${API_BASE}/api/admin/liberar-por-id`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_visto: idVisto })
            });

            if(res.ok) {
                resDiv.innerHTML = `<span style="color:green">✅ Código #${idVisto} Liberado!</span>`;
                document.getElementById('input-id').value = "";
            } else {
                resDiv.innerHTML = `<span style="color:red">❌ Código não encontrado.</span>`;
            }
        }

        // 4. Carregar Fotos Pendentes em CARDS
        async function carregarPendentes() {
            const res = await fetch(`${API_BASE}/api/admin/pendentes`);
            const fotos = await res.json();
            const lista = document.getElementById('lista-pendentes');

            if(fotos.length === 0) {
                lista.innerHTML = "<p style='text-align:center'>Nenhuma foto para aprovar.</p>";
                return;
            }

            lista.innerHTML = fotos.map(f => `
                <div class="admin-card">
                    <img src="${API_BASE}/temp/${f}">
                    <div class="admin-acoes">
                        <button class="btn-aprovar" onclick="decidirFoto('${f}', 'aprovar')">APROVAR ✅</button>
                        <button class="btn-excluir" onclick="decidirFoto('${f}', 'deletar')">EXCLUIR ❌</button>
                    </div>
                </div>
            `).join('');
        }

        // 5. Aprovar ou Deletar Foto
        async function decidirFoto(foto, acao) {
            await fetch(`${API_BASE}/api/admin/decidir-foto`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ foto, acao })
            });
            carregarPendentes();
        }

        // 6. Carregar Colaboradores
        async function carregarColaboradores() {
            const res = await fetch(`${API_BASE}/api/admin/colaboradores`);
            const colabs = await res.json();
            const lista = document.getElementById('lista-colabs');

            if(colabs.length === 0) {
                lista.innerHTML = "<p style='text-align:center'>Nenhum cadastro recebido.</p>";
                return;
            }

            lista.innerHTML = colabs.map(c => `
                <div style="border:1px solid #ddd; padding:10px; border-radius:8px; margin-bottom:10px; background:#fff;">
                    <p><b>Nome:</b> ${c.nome}</p>
                    <p><b>Função:</b> ${c.funcao}</p>
                    <p><b>WhatsApp:</b> ${c.telefone || 'Não informado'}</p>
                    <hr style="margin:5px 0; border:0; border-top:1px solid #eee;">
                    <p style="font-size:13px; color:#555;">${c.exp || 'Sem detalhes'}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
