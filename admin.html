<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header"><span>Painel Admin</span></div>

    <div class="container" id="login">
        <h1>🔐 Login</h1>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">Acessar</button>
    </div>

    <div class="container" id="painel" style="display:none;">
        <h2>Pedidos e Pix</h2>
        <table id="tabela"></table>
    </div>

    <script>
        const API_BASE = "https://toolbar-bodies-isolation-gorgeous.trycloudflare.com";
        async function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            if(res.ok) { document.getElementById('login').style.display='none'; document.getElementById('painel').style.display='block'; atualizar(); }
        }

        async function atualizar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            const pedidos = await res.json();
            
            document.getElementById('tabela').innerHTML = `<tr><th>Data</th><th>Status/Nome</th><th>Ação</th></tr>` + 
            pedidos.reverse().map(pd => `
                <tr style="${pd.status === 'pendente' ? 'background:#fff3cd' : ''}">
                    <td>${pd.data}</td>
                    <td>${pd.status === 'pendente' ? '🚨 AGUARDANDO PIX' : pd.nome}</td>
                    <td>
                        ${pd.status === 'pendente' ? 
                        `<button onclick="liberar('${pd.id}')" style="background:blue;color:white;border-radius:5px;">Validar Pix</button>` : 
                        `<a href="https://wa.me/5573988478170">WhatsApp</a>`}
                    </td>
                </tr>
            `).join('');
        }

        async function liberar(id) {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            await fetch(`${API_BASE}/api/admin/liberar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user, pass, id}) });
            atualizar();
        }
    </script>
</body>
</html>
