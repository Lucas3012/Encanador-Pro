<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container" id="login">
        <h1>🔐 Admin</h1>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="fazerLogin()">Acessar</button>
    </div>

    <div class="container" id="painel" style="display:none;">
        <h2>Pedidos</h2>
        <table id="tabela-pedidos"></table>
        <hr>
        <h2>Galeria</h2>
        <div id="galeria-admin" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
    </div>

    <script>
        const API_BASE = "https://clinton-travelling-monthly-term.trycloudflare.com";
        async function fazerLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/admin/pedidos?user=${user}&pass=${pass}`);
            if(res.ok) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                atualizar(user, pass);
            }
        }

        async function atualizar(u, p) {
            const resP = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            const pedidos = await resP.json();
            document.getElementById('tabela-pedidos').innerHTML = `<tr><th>Cliente</th><th>Ação</th></tr>` + 
                pedidos.map(pd => `<tr><td>${pd.nome}</td><td><a href="https://wa.me/5573988478170" target="_blank">Ver</a></td></tr>`).join('');

            const resF = await fetch(`${API_BASE}/api/fotos`);
            const fotos = await resF.json();
            document.getElementById('galeria-admin').innerHTML = fotos.map(f => `
                <div style="border:1px solid #ddd; padding:5px;">
                    <img src="${API_BASE}/galeria/${f}" width="80"><br>
                    <button class="btn-del" onclick="apagar('${f}')">X</button>
                </div>
            `).join('');
        }

        async function apagar(nome) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            await fetch(`${API_BASE}/api/fotos/${nome}?user=${u}&pass=${p}`, {method:'DELETE'});
            atualizar(u, p);
        }
    </script>
</body>
</html>
