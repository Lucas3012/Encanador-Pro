<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar"><a href="index.html">Sair</a></div>

    <div class="container" id="login">
        <h1>🔐 Admin</h1>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>

    <div class="container" id="painel" style="display:none;">
        <h2>🕵️ Fotos Pendentes (Moderação)</h2>
        <div id="pendentes" class="grid"></div>
        <hr>
        <h2>📋 Pedidos Recentes</h2>
        <table id="pedidos"></table>
    </div>

    <script>
        const API_BASE = "https://relates-glow-roommate-put.trycloudflare.com";
        async function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            if(res.ok) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                atualizar();
            }
        }

        async function atualizar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Carregar Pendentes
            const resF = await fetch(`${API_BASE}/api/admin/pendentes?user=${u}&pass=${p}`);
            const fotos = await resF.json();
            document.getElementById('pendentes').innerHTML = fotos.map(f => `
                <div class="card">
                    <img src="${API_BASE}/temp_galeria/${f}">
                    <button onclick="decidir('${f}', 'aprovar')" style="background:green">Aprovar</button>
                    <button onclick="decidir('${f}', 'reprovar')" style="background:red">Recusar</button>
                </div>
            `).join('');

            // Carregar Pedidos
            const resP = await fetch(`${API_BASE}/admin/pedidos?user=${u}&pass=${p}`);
            const pedidos = await resP.json();
            document.getElementById('pedidos').innerHTML = `<tr><th>Cliente</th><th>Ação</th></tr>` + 
                pedidos.map(pd => `<tr><td>${pd.nome}</td><td><a href="https://wa.me/5573988478170">Ver</a></td></tr>`).join('');
        }

        async function decidir(foto, acao) {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            await fetch(`${API_BASE}/api/admin/decidir`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user, pass, foto, acao })
            });
            atualizar();
        }
    </script>
</body>
</html>
