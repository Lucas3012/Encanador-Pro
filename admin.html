<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Painel Administrativo</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="historico.html">📋 Histórico</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div id="login-screen" class="container" style="margin-top: 50px;">
        <h2 style="text-align:center; margin-bottom:20px;">🔒 Acesso Restrito</h2>
        <input type="password" id="admin-pass" placeholder="Senha do Mestre" style="text-align:center;">
        <button onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="panel-content" style="display:none">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="mudarAba('tab-pix', this)">💰 Liberar PIX</button>
            <button class="tab-btn" onclick="mudarAba('tab-galeria', this)">📸 Galeria</button>
            <button class="tab-btn" onclick="mudarAba('tab-colab', this)">👷 Técnicos</button>
        </div>

        <div id="tab-pix" class="admin-section active container">
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom:15px; font-size:16px;">Liberar Formulário do Cliente</h3>
                <p style="font-size:12px; color:#666; margin-bottom:10px;">Digite o código de 4 dígitos informado pelo cliente:</p>
                <input type="number" id="input-id" placeholder="Ex: 1234" style="font-size:24px; text-align:center; font-weight:bold; letter-spacing:5px;">
                <button onclick="validarID()" style="background:#28a745;">CONFIRMAR PAGAMENTO ✅</button>
            </div>
        </div>

        <div id="tab-galeria" class="admin-section container">
            <h3 style="margin-bottom:15px;">Fotos para Aprovação</h3>
            <div id="lista-pendentes"></div>
        </div>

        <div id="tab-colab" class="admin-section container">
            <h3 style="margin-bottom:15px;">Gestão de Profissionais</h3>
            <div id="lista-colabs"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000";

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        function fazerLogin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === '1234') { // Troque '1234' pela sua senha real
                Swal.fire({ icon: 'success', title: 'Bem-vindo, Mestre!', timer: 1500, showConfirmButton: false });
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
            } else {
                Swal.fire('Erro', 'Senha incorreta!', 'error');
            }
        }

        function mudarAba(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            btn.classList.add('active');
            if(id === 'tab-galeria') carregarPendentes();
            if(id === 'tab-colab') carregarColabs();
        }

        async function validarID() {
            const idInput = document.getElementById('input-id').value;
            if(!idInput) return Swal.fire('Atenção', 'Digite o ID do pedido!', 'warning');

            Swal.fire({ title: 'Processando...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API}/api/admin/liberar-por-id`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ id_visto: idInput }) 
                });

                if(res.ok) {
                    Swal.fire('Sucesso!', `Cliente #${idInput} liberado com sucesso.`, 'success');
                    document.getElementById('input-id').value = "";
                } else {
                    Swal.fire('Ops!', 'Este código não foi encontrado no banco.', 'error');
                }
            } catch (e) {
                Swal.fire('Erro', 'O servidor no Termux está offline.', 'error');
            }
        }

        async function carregarPendentes() {
            const res = await fetch(`${API}/api/admin/pendentes`);
            const fotos = await res.json();
            const container = document.getElementById('lista-pendentes');
            if(fotos.length === 0) return container.innerHTML = "<p>Nenhuma foto pendente.</p>";
            
            container.innerHTML = fotos.map(f => `
                <div class="admin-card">
                    <img src="${API}/temp/${f}" style="width:100%; border-radius:8px;">
                    <div class="admin-acoes" style="display:flex; gap:5px; margin-top:10px;">
                        <button onclick="decidirFoto('${f}','aprovar')" style="background:green">✓</button>
                        <button onclick="decidirFoto('${f}','deletar')" style="background:red">✕</button>
                    </div>
                </div>`).join('');
        }

        async function decidirFoto(foto, acao) {
            await fetch(`${API}/api/admin/decidir-foto`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ foto, acao }) 
            });
            carregarPendentes();
        }

        async function carregarColabs() {
            const res = await fetch(`${API}/api/admin/colaboradores`);
            const colabs = await res.json();
            const container = document.getElementById('lista-colabs');
            container.innerHTML = colabs.map(c => `
                <div class="admin-card" style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px;">
                    <b>${c.nome}</b> (${c.funcao})
                    <div style="margin-top:5px;">
                        ${!c.aprovado ? `<button onclick="decidirColab('${c.id}','aprovar')" style="font-size:10px; background:blue;">APROVAR NO MAPA</button>` : '<span style="color:green; font-size:12px;">✓ Já está no mapa</span>'}
                        <button onclick="decidirColab('${c.id}','deletar')" style="font-size:10px; background:red;">REMOVER</button>
                    </div>
                </div>`).join('');
        }

        async function decidirColab(id, acao) {
            await fetch(`${API}/api/admin/decidir-colaborador`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id, acao }) 
            });
            carregarColabs();
        }
    </script>
</body>
</html>
