<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhe Conosco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">👷 Parceiros</div>
    <div class="container">
        <form id="fColab">
            <input type="text" id="n" placeholder="Nome" required>
            <input type="tel" id="t" placeholder="WhatsApp" required>
            <select id="fun"><option value="Encanador">Encanador</option><option value="Eletricista">Eletricista</option></select>
            <textarea id="e" placeholder="Experiência..."></textarea>
            <button type="submit">Cadastrar</button>
        </form>
    </div>
    <script>
        document.getElementById('fColab').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('http://localhost:3000/api/colaborador', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({nome:document.getElementById('n').value, funcao:document.getElementById('fun').value})
            });
            alert("Sucesso!"); location.href="index.html";
        };
    </script>
</body>
</html>
