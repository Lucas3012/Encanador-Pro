<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Itabuna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="status-bar">
        <span>📍 Itabuna e Região</span>
        <span id="sys-status"><span class="dot offline"></span> Verificando...</span>
    </div>

    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Encanador Pro</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" style="font-size:30px; text-align:right; padding-right:20px;">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <h2 style="text-align:center">🛠️ Serviços</h2>
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')"><div class="icone-bola">💧</div><span>Vazamento</span></div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')"><div class="icone-bola">🛠️</div><span>Reparo</span></div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')"><div class="icone-bola">🚽</div><span>Entupiu</span></div>
        </div>

        <div id="map"></div>

        <div id="form-container" style="display:none; margin-top:20px;">
            <form id="formOrcamento">
                <h3 style="color:#25d366; text-align:center">✅ Pagamento Liberado!</h3>
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="end" placeholder="Seu Endereço em Itabuna" required>
                <input type="text" id="serv_display" readonly>
                <textarea id="msg" placeholder="Descreva o problema..."></textarea>
                <button type="submit" style="background:#25d366">Enviar Pedido no WhatsApp 💬</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_BASE = "https://told-istanbul-instructions-instruction.trycloudflare.com";
        const MEU_WHATSAPP = "5573988478170";

        // CONFIGURAÇÃO DO MAPA
        const map = L.map('map').setView([-14.7967, -39.2814], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.circle([-14.7967, -39.2814], { color: 'red', fillOpacity: 0.1, radius: 4000 }).addTo(map);

        async function carregarTecnicosNoMapa() {
            try {
                const res = await fetch(`${API_BASE}/api/aprovados`);
                const técnicos = await res.json();
                técnicos.forEach(t => {
                    const lat = -14.7967 + (Math.random() - 0.5) * 0.03;
                    const lng = -39.2814 + (Math.random() - 0.5) * 0.03;
                    L.marker([lat, lng]).addTo(map).bindPopup(`<b>👷 ${t.funcao}</b><br>${t.nome}<br><span style="color:green">Disponível</span>`);
                });
            } catch (e) { console.log("Erro ao carregar técnicos"); }
        }

        async function checkStatus() {
            const el = document.getElementById('sys-status');
            try {
                const res = await fetch(`${API_BASE}/api/galeria`);
                el.innerHTML = res.ok ? `<span class="dot online"></span> Sistema Online` : `<span class="dot offline"></span> Offline`;
            } catch (e) { el.innerHTML = `<span class="dot offline"></span> Offline`; }
        }

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        async function abrirPix(servico) {
            const idGerado = Math.floor(1000 + Math.random() * 9000).toString();
            const pix = "00020126360014br.gov.bcb.pix0114+557398847817052040000530398654045.005802BR5921Lucas Emanuel Tavares6009Sao Paulo62230519daqr4913550667180526304C9B1";
            const linkWhats = `https://wa.me/${MEU_WHATSAPP}?text=${encodeURIComponent('Olá, código #' + idGerado + '. Pagamento realizado aguardando liberação.')}`;

            Swal.fire({
                title: 'Reserva',
                html: `<p>CÓDIGO:</p><span class="pedido-id-vermelho">#${idGerado}</span><button onclick="window.open('${linkWhats}', '_blank')" style="background:#25d366; color:white; border:none; padding:12px; border-radius:8px; width:100%; margin-bottom:10px;">ENVIAR VIA WHATSAPP 💬</button><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pix)}">`,
                allowOutsideClick: false, showConfirmButton: false
            });

            await fetch(`${API_BASE}/api/registrar-id`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id_visto: idGerado, servico}) });

            const timer = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${idGerado}`);
                const d = await res.json();
                if(d.status === 'liberado') { 
                    clearInterval(timer); Swal.close(); 
                    document.getElementById('form-container').style.display = 'block'; 
                    document.getElementById('serv_display').value = servico;
                    document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
                }
            }, 3000);
        }

        document.getElementById('formOrcamento').onsubmit = (e) => {
            e.preventDefault();
            const texto = `*NOVO PEDIDO*%0A*Serviço:* ${document.getElementById('serv_display').value}%0A*Nome:* ${document.getElementById('nome').value}%0A*End:* ${document.getElementById('end').value}`;
            window.open(`https://wa.me/${MEU_WHATSAPP}?text=${texto}`, '_blank');
        };

        checkStatus();
        setInterval(checkStatus, 5000);
        carregarTecnicosNoMapa();
    </script>
</body>
</html>
