<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header"><span class="menu-icon" onclick="toggleNav()">&#9776;</span><b>Encanador Pro</b></div>
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" style="font-size:30px">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <h2 style="text-align:center">🛠️ Serviços</h2>
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')"><div class="icone-bola">💧</div><span>Vazamento</span></div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')"><div class="icone-bola">🛠️</div><span>Reparo</span></div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')"><div class="icone-bola">🚽</div><span>Entupiu</span></div>
        </div>
        <div id="form-container" style="display:none">
            <form id="formOrcamento">
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="end" placeholder="Endereço" required>
                <input type="text" id="serv_display" readonly>
                <textarea id="msg" placeholder="Detalhes..."></textarea>
                <button type="submit" style="background:var(--secondary)">Enviar WhatsApp 💬</button>
            </form>
        </div>
    </div>

    <script>
        function toggleNav() { const s = document.getElementById("mySidebar"); s.style.width = s.style.width === "250px" ? "0" : "250px"; }
        async function abrirPix(s) {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            const pix = "SUA_CHAVE_PIX_AQUI";
            Swal.fire({
                title: 'Reserva',
                html: `<span class="pedido-id-neon">#${id}</span><img src="https://api.qrserver.com/v1/create-qr-code/?data=${pix}"><span class="pix-code">${pix}</span>`,
                allowOutsideClick: false, showConfirmButton: false
            });
            await fetch('http://localhost:3000/api/registrar-id', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id_visto:id, servico:s}) });
            const timer = setInterval(async () => {
                const res = await fetch('http://localhost:3000/api/status/'+id);
                const d = await res.json();
                if(d.status === 'liberado') { clearInterval(timer); Swal.close(); document.getElementById('form-container').style.display='block'; document.getElementById('serv_display').value=s; }
            }, 3000);
        }
    </script>
</body>
</html>
