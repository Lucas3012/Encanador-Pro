<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Encanador Pro</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" style="font-size:30px">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <h2 style="text-align:center">🛠️ Serviços</h2>
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')">
                <div class="icone-bola">💧</div>
                <span>Vazamento</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')">
                <div class="icone-bola">🛠️</div>
                <span>Reparo</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')">
                <div class="icone-bola">🚽</div>
                <span>Entupiu</span>
            </div>
        </div>

        <div id="form-container" style="display:none">
            <form id="formOrcamento">
                <h3 style="color:#25d366; text-align:center">✅ Pagamento Liberado!</h3>
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="end" placeholder="Seu Endereço" required>
                <input type="text" id="serv_display" readonly>
                <textarea id="msg" placeholder="Descreva o problema..."></textarea>
                <button type="submit" style="background:#25d366">Enviar Pedido no WhatsApp 💬</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "https://smallest-mario-run-tolerance.trycloudflare.com";
        const MEU_WHATSAPP = "5573988478170"; // Seu número

        function toggleNav() { 
            const s = document.getElementById("mySidebar"); 
            s.style.width = s.style.width === "250px" ? "0" : "250px"; 
        }

        async function abrirPix(servico) {
            const idGerado = Math.floor(1000 + Math.random() * 9000).toString();
            const pix = "00020126360014br.gov.bcb.pix0114+557398847817052040000530398654045.005802BR5921Lucas Emanuel Tavares6009Sao Paulo62230519daqr4913550667180526304C9B1";
            
            // Link para enviar o código pro seu WhatsApp
            const msgWhats = encodeURIComponent(`Olá, código #${idGerado}. Pagamento realizado aguardando liberação.`);
            const linkWhats = `https://wa.me/${MEU_WHATSAPP}?text=${msgWhats}`;

            Swal.fire({
                title: 'Reserva de Atendimento',
                html: `
                    <p>INFORME ESTE CÓDIGO AO ENCANADOR:</p>
                    <span class="pedido-id-vermelho">#${idGerado}</span>
                    
                    <button onclick="window.open('${linkWhats}', '_blank')" style="background:#25d366; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer; margin-bottom:15px; width:100%;">
                        ENVIAR CÓDIGO VIA WHATSAPP 💬
                    </button>

                    <p style="font-size:12px">Ou pague o QR Code abaixo:</p>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pix)}" style="margin:10px 0;">
                    
                    <span class="pix-code" style="font-size:10px">${pix}</span>
                    <button onclick="navigator.clipboard.writeText('${pix}'); alert('Copiado!')" style="background:#ccc; color:#000; padding:5px; font-size:10px; width:100%; border:none;">Copiar Código Pix</button>
                `,
                footer: 'Mantenha esta tela aberta até a liberação.',
                allowOutsideClick: false,
                showConfirmButton: false
            });

            // Envia para o servidor para você poder liberar no admin
            await fetch(`${API_BASE}/api/registrar-id`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({id_visto: idGerado, servico}) 
            });

            // Fica checando se você liberou no painel admin
            const timer = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${idGerado}`);
                const d = await res.json();
                if(d.status === 'liberado') { 
                    clearInterval(timer); 
                    Swal.close(); 
                    document.getElementById('form-container').style.display = 'block'; 
                    document.getElementById('serv_display').value = servico;
                    document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
                }
            }, 3000);
        }

        document.getElementById('formOrcamento').onsubmit = (e) => {
            e.preventDefault();
            const n = document.getElementById('nome').value;
            const ed = document.getElementById('end').value;
            const ms = document.getElementById('msg').value;
            const sv = document.getElementById('serv_display').value;
            
            const textoFinal = `*NOVO PEDIDO CONFIRMADO*%0A*Serviço:* ${sv}%0A*Nome:* ${n}%0A*Endereço:* ${ed}%0A*Detalhes:* ${ms}`;
            window.open(`https://wa.me/${MEU_WHATSAPP}?text=${textoFinal}`, '_blank');
        };
    </script>
</body>
</html>
