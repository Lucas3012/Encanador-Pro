<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Início</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container">
        <h1>🛠️ Encanador Pro</h1>
        <p style="text-align:center">Soluções rápidas para vazamentos e instalações.</p>
        
        <form id="formOrcamento">
            <input type="text" id="nome" placeholder="Seu Nome" required>
            <input type="text" id="endereco" placeholder="Seu Endereço" required>
            <input type="text" id="servico" placeholder="Tipo de Serviço (Ex: Vaso entupido)" required>
            <textarea id="mensagem" placeholder="Detalhes adicionais..." rows="4"></textarea>
            <button type="submit">Enviar Pedido de Orçamento</button>
        </form>
    </div>

    <script>
        const API_BASE = "https://albums-speaks-notes-fired.trycloudflare.com";

        document.getElementById('formOrcamento').onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                endereco: document.getElementById('endereco').value,
                servico: document.getElementById('servico').value,
                mensagem: document.getElementById('mensagem').value
            };
            try {
                const res = await fetch(`${API_BASE}/orcamento`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });
                if(res.ok) { alert('Pedido enviado com sucesso!'); e.target.reset(); }
                else { alert('Erro ao enviar pedido.'); }
            } catch (err) { alert('Erro de conexão com o servidor.'); }
        };
    </script>
</body>
</html>
