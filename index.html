<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Itabuna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="status-bar">
        <span>📍 Atendimento em Itabuna-BA</span>
        <span id="sys-status">🟢 Verificando...</span>
    </div>

    <div class="header">
        <h1 class="logo-centralizado">💧 ENCANADOR PRO</h1>
    </div>

    <div class="container">
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')"><div class="icone-bola">💧</div><span>Vazamento</span></div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')"><div class="icone-bola">🛠️</div><span>Reparo</span></div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')"><div class="icone-bola">🚽</div><span>Entupiu</span></div>
        </div>

        <div class="secao-titulo">👨‍🔧 Técnicos de Plantão:</div>
        <div id="lista-tecnicos">
            <p style="text-align:center; color:#888; font-size:12px;">Carregando profissionais...</p>
        </div>

        <div class="secao-titulo">📍 Cobertura em Itabuna:</div>
        <div id="map" style="height: 200px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #fff;"></div>

        <div id="form-container" style="display:none; background: #fff; padding: 20px; border-radius: 15px; border: 3px solid #25d366; margin-bottom: 80px;">
            <h3 style="text-align:center; color:#25d366; margin-top:0;">✅ Acesso Liberado!</h3>
            <input type="text" id="end" placeholder="Seu Endereço em Itabuna" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="serv_display" readonly style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; background:#f9f9f9;">
            <button onclick="enviarWhatsFinal()" style="width:100%; background:#25d366; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">SOLICITAR TÉCNICO AGORA 💬</button>
        </div>
    </div>

    <a href="https://wa.me/5573988478170?text=Olá!%20Vi%20o%20site%20e%20preciso%20de%20um%20encanador%20em%20Itabuna." 
       class="whatsapp-float" 
       target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        <span>Falar com o Mestre</span>
    </a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ATUALIZE ESTE LINK COM O SEU CLOUDFLARE ATIVO
        const API_BASE = "https://shaw-avenue-columbus-crafts.trycloudflare.com";

        // Inicializar Mapa
        const map = L.map('map', { zoomControl: false }).setView([-14.7924, -39.2821], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Carregar Técnicos do Servidor
        async function carregarTecnicos() {
            try {
                const res = await fetch(`${API_BASE}/api/aprovados`, { headers: {'bypass-tunnel-reminder': 'true'} });
                const dados = await res.json();
                document.getElementById('lista-tecnicos').innerHTML = dados.map(t => `
                    <div class="card-tecnico">
                        <div class="tecnico-info"><b>${t.nome}</b><span>${t.funcao}</span></div>
                        <a href="https://wa.me/${t.telefone.replace(/\D/g,'')}" class="btn-whats-tecnico">💬</a>
                    </div>
                `).join('') || "<p style='font-size:12px; color:#888;'>Nenhum técnico disponível no momento.</p>";
                document.getElementById('sys-status').innerText = "🟢 Sistema Online";
            } catch(e) {
                document.getElementById('sys-status').innerText = "🔴 Sistema Offline";
            }
        }

        // Função do PIX
        async function abrirPix(servico) {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            Swal.fire({
                title: 'Reserva de Visita',
                html: `<p>ID: <b>#${id}</b></p><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CHAVE_PIX_AQUI" style="margin:10px;"><p style="font-size:12px; color:#666;">Pague o Pix para liberar o agendamento.</p>`,
                showConfirmButton: false
            });

            await fetch(`${API_BASE}/api/registrar-id`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json', 'bypass-tunnel-reminder': 'true'}, 
                body: JSON.stringify({ id_visto: id, servico: servico }) 
            });

            const check = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${id}`, { headers: {'bypass-tunnel-reminder': 'true'} });
                const data = await res.json();
                if(data.status === 'liberado') {
                    clearInterval(check);
                    Swal.close();
                    document.getElementById('form-container').style.display = 'block';
                    document.getElementById('serv_display').value = servico;
                    window.scrollTo(0, document.body.scrollHeight);
                }
            }, 3000);
        }

        function enviarWhatsFinal() {
            const end = document.getElementById('end').value;
            const serv = document.getElementById('serv_display').value;
            if(!end) return alert("Por favor, digite seu endereço.");
            const texto = `Olá! Fiz o pagamento da reserva para ${serv}. Meu endereço é: ${end}`;
            window.open(`https://wa.me/5573988478170?text=${encodeURIComponent(texto)}`);
        }

        window.onload = carregarTecnicos;
    </script>
</body>
</html>
