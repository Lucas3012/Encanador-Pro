<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Itabuna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .secao-titulo { font-size: 14px; margin: 20px 0 10px; color: #555; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        #lista-tecnicos { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

        .card-tecnico {
            background: white;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-left: 5px solid #007bff;
        }

        .tecnico-info { display: flex; align-items: center; gap: 15px; }
        .tecnico-texto b { display: block; font-size: 15px; color: #333; }
        .tecnico-texto span { font-size: 13px; color: #666; }
        
        /* BOTÃO WHATSAPP ORIGINAL */
        .btn-whats-tecnico { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .btn-whats-tecnico img {
            width: 45px; /* Tamanho maior para visibilidade */
            height: 45px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
        }

        .btn-whats-tecnico:active { transform: scale(0.9); }

        /* Animação de atenção */
        .pulse-green {
            animation: pulse-animation 2s infinite;
            border-radius: 50%;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(37, 211, 102, 0.5); }
            100% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
        }

        #map { height: 180px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>📍 Itabuna-BA</span>
        <span id="sys-status"><span class="dot offline"></span> Verificando...</span>
    </div>

    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Encanador Pro</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')"><div class="icone-bola">💧</div><span>Vazamento</span></div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')"><div class="icone-bola">🛠️</div><span>Reparo</span></div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')"><div class="icone-bola">🚽</div><span>Entupiu</span></div>
        </div>

        <div class="secao-titulo">👨‍🔧 Profissionais em Itabuna:</div>
        <div id="lista-tecnicos">
            </div>

        <div class="secao-titulo">📍 Área de Cobertura:</div>
        <div id="map"></div>

        <div id="form-container" style="display:none;">
            <form id="formOrcamento">
                <h3 style="color:#25d366; text-align:center">✅ Acesso Liberado!</h3>
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="end" placeholder="Endereço em Itabuna" required>
                <input type="text" id="serv_display" readonly>
                <textarea id="msg" placeholder="Descreva o problema..." rows="3"></textarea>
                <button type="submit" style="background:#25d366">Enviar no WhatsApp 💬</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_BASE = "https://miscellaneous-das-ids-section.trycloudflare.com";
        const WHATS_GESTOR = "5573988478170";

        const map = L.map('map', { zoomControl: false }).setView([-14.7967, -39.2814], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.circle([-14.7967, -39.2814], { color: 'red', fillOpacity: 0.1, radius: 3000 }).addTo(map);

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        async function carregarCardsTecnicos() {
            try {
                const res = await fetch(`${API_BASE}/api/aprovados`);
                const tecnicos = await res.json();
                const container = document.getElementById('lista-tecnicos');
                
                if(tecnicos.length === 0) {
                    container.innerHTML = "<p style='font-size:12px; color:#999; text-align:center;'>Aguardando técnicos online...</p>";
                    return;
                }

                container.innerHTML = tecnicos.map(t => `
                    <div class="card-tecnico">
                        <div class="tecnico-info">
                            <span style="font-size: 26px;">👨‍🔧</span>
                            <div class="tecnico-texto">
                                <b>${t.nome}</b>
                                <span>${t.funcao} • <small style="color:#25d366">● Online</small></span>
                            </div>
                        </div>
                        <a href="https://wa.me/${t.telefone.replace(/\D/g,'')}" target="_blank" class="btn-whats-tecnico pulse-green">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                        </a>
                    </div>
                `).join('');
            } catch (e) { console.error("Erro técnicos:", e); }
        }

        async function checkStatus() {
            const el = document.getElementById('sys-status');
            try {
                const res = await fetch(`${API_BASE}/api/galeria`);
                el.innerHTML = res.ok ? `<span class="dot online"></span> Sistema Online` : `<span class="dot offline"></span> Offline`;
            } catch (e) { el.innerHTML = `<span class="dot offline"></span> Offline`; }
        }

        async function abrirPix(servico) {
            const idGerado = Math.floor(1000 + Math.random() * 9000).toString();
            const pix = "00020126360014br.gov.bcb.pix0114+557398847817052040000530398654045.005802BR5921Lucas Emanuel Tavares6009Sao Paulo62230519daqr4913550667180526304C9B1";
            
            Swal.fire({
                title: 'Reserva',
                html: `
                    <p>Código: <b style="color:red">#${idGerado}</b></p>
                    <button onclick="window.open('https://wa.me/${WHATS_GESTOR}?text=Pagamento%20ID%20${idGerado}')" style="background:#25d366; color:white; border:none; padding:10px; border-radius:5px; width:100%;">AVISAR PAGAMENTO 💬</button>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pix)}" style="margin-top:15px;">
                `,
                showConfirmButton: false
            });

            await fetch(`${API_BASE}/api/registrar-id`, { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({id_visto: idGerado, servico}) 
            });

            const timer = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${idGerado}`);
                const d = await res.json();
                if(d.status === 'liberado') { 
                    clearInterval(timer); Swal.close(); 
                    document.getElementById('form-container').style.display = 'block'; 
                    document.getElementById('serv_display').value = servico;
                    document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
                }
            }, 3000);
        }

        document.getElementById('formOrcamento').onsubmit = (e) => {
            e.preventDefault();
            const texto = `*PEDIDO*%0A*Serviço:* ${document.getElementById('serv_display').value}%0A*Nome:* ${document.getElementById('nome').value}%0A*End:* ${document.getElementById('end').value}`;
            window.open(`https://wa.me/${WHATS_GESTOR}?text=${texto}`, '_blank');
        };

        checkStatus();
        setInterval(checkStatus, 5000);
        carregarCardsTecnicos();
        setInterval(carregarCardsTecnicos, 20000);
    </script>
</body>
</html>
