<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Itabuna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="status-bar">
        <span>📍 Itabuna-BA</span>
        <span id="sys-status">🟢 Verificando...</span>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="index.html">🏠 Início</a>
        <a href="historico.html">📜 Histórico</a>
        <a href="galeria.html">🖼️ Galeria</a>
        <a href="trabalhe.html">💼 Trabalhe Conosco</a>
        <hr style="border-top: 1px solid #444; margin: 10px 0;">
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="header">
        <span class="openbtn" onclick="openNav()">&#9776;</span>
        <h1 class="logo-centralizado">💧 ENCANADOR PRO</h1>
    </div>

    <div class="container">
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')">
                <div class="icone-bola">💧</div>
                <span>Vazamento</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')">
                <div class="icone-bola">🛠️</div>
                <span>Reparo</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')">
                <div class="icone-bola">🚽</div>
                <span>Entupiu</span>
            </div>
        </div>

        <div class="secao-titulo">👨‍🔧 Técnicos de Plantão:</div>
        <div id="lista-tecnicos"></div>

        <div class="secao-titulo">📍 Cobertura em Itabuna:</div>
        <div id="map"></div>

        <div id="form-container" style="display:none; background: #fff; padding: 20px; border-radius: 15px; border: 3px solid #25d366; margin-top: 20px; margin-bottom: 100px;">
            <h3 style="text-align:center; color:#25d366; margin-top:0;">✅ Acesso Liberado!</h3>
            <input type="text" id="end" placeholder="Seu Endereço em Itabuna">
            <input type="text" id="serv_display" readonly>
            <button onclick="enviarWhatsFinal()" class="btn-agendar">SOLICITAR TÉCNICO AGORA 💬</button>
        </div>
    </div>

    <a href="https://wa.me/5573988478170?text=Olá!%20Vi%20o%20site%20e%20preciso%20de%20um%20encanador%20em%20Itabuna." 
       class="whatsapp-float" 
       target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        <span>Falar com o Mestre</span>
    </a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        const API_BASE = "https://bennett-data-warranties-calculate.trycloudflare.com";

        const map = L.map('map', { zoomControl: false }).setView([-14.7924, -39.2821], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function carregarTecnicos() {
            try {
                const res = await fetch(`${API_BASE}/api/aprovados`, { headers: {'bypass-tunnel-reminder': 'true'} });
                const dados = await res.json();
                document.getElementById('lista-tecnicos').innerHTML = dados.map(t => `
                    <div class="card-tecnico">
                        <div class="tecnico-info"><b>${t.nome}</b><span>${t.funcao}</span></div>
                        <a href="https://wa.me/${t.telefone.replace(/\D/g,'')}" class="btn-whats-tecnico">💬</a>
                    </div>
                `).join('') || "<p style='text-align:center; font-size:12px; color:#999;'>Buscando técnicos...</p>";
                document.getElementById('sys-status').innerText = "🟢 Online";
            } catch(e) { document.getElementById('sys-status').innerText = "🔴 Offline"; }
        }

        window.onload = carregarTecnicos;
    </script>
</body>
</html>
