<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro - Orçamento Rápido</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #004a99; color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #25d366; color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1eb954; }
    </style>
</head>
<body>

    <header>
        <h1>🔧 Encanador Pro</h1>
    </header>

    <div class="container">
        <h2>Solicitar Orçamento</h2>
        <form id="form-orcamento">
            <label>Seu Nome:</label>
            <input type="text" id="nome" placeholder="Ex: Lucas Silva" required>

            <label>Serviço Necessário:</label>
            <select id="servico">
                <option value="Vazamento">Vazamento</option>
                <option value="Desentupimento">Desentupimento</option>
                <option value="Instalação">Instalação Geral</option>
                <option value="Outros">Outros</option>
            </select>

            <label>Mensagem/Endereço:</label>
            <textarea id="mensagem" rows="4" placeholder="Descreva brevemente o problema..."></textarea>

            <button type="submit" id="btn-enviar">Enviar Pedido</button>
        </form>
    </div>

    <script>
        // O script iniciar.sh vai trocar esse link automaticamente pelo link do Cloudflare
        const API_URL = "http://localhost:3000"; 

        document.getElementById('form-orcamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-enviar');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const dados = {
                nome: document.getElementById('nome').value,
                servico: document.getElementById('servico').value,
                mensagem: document.getElementById('mensagem').value
            };

            try {
                const response = await fetch(`${API_URL}/orcamento`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert("✅ Pedido enviado! Entraremos em contato.");
                    document.getElementById('form-orcamento').reset();
                } else {
                    alert("❌ Erro ao enviar pedido.");
                }
            } catch (error) {
                alert("❌ Servidor offline. Tente mais tarde.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Pedido";
            }
        });
    </script>
</body>
</html>
