<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container">
        <h1>🛠️ Encanador Pro</h1>
        <p style="text-align:center">Atendimento rápido em toda região!</p>
        <form id="formOrcamento">
            <input type="text" id="nome" placeholder="Seu Nome" required>
            <input type="text" id="endereco" placeholder="Seu Endereço" required>
            <input type="text" id="servico" placeholder="O que você precisa?" required>
            <textarea id="mensagem" placeholder="Detalhes do problema..."></textarea>
            <button type="submit">Pedir Orçamento</button>
        </form>
    </div>

    <a href="https://wa.me/5573988478170?text=Olá! Vim pelo site e gostaria de um orçamento." class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <script>
        const API_BASE = "https://pitch-closing-idea-wind.trycloudflare.com";
        document.getElementById('formOrcamento').onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                endereco: document.getElementById('endereco').value,
                servico: document.getElementById('servico').value,
                mensagem: document.getElementById('mensagem').value
            };
            const res = await fetch(`${API_BASE}/orcamento`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            if(res.ok) { alert('Recebemos seu pedido!'); e.target.reset(); }
        };
    </script>
</body>
</html>
