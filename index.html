<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <span style="font-weight: bold;">Encanador Pro</span>
    </div>

    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="index.html">Início</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container">
        <h1 style="text-align: center;">🛠️ Serviços</h1>
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')">
                <div class="icone-bola">💧</div>
                <span style="font-size: 12px; font-weight: bold;">Vazamento</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')">
                <div class="icone-bola">🛠️</div>
                <span style="font-size: 12px; font-weight: bold;">Reparo</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')">
                <div class="icone-bola">🚽</div>
                <span style="font-size: 12px; font-weight: bold;">Desentupimento</span>
            </div>
        </div>

        <div id="form-container" style="display: none;">
            <form id="formOrcamento">
                <h3 style="color: #25d366; text-align: center;">✅ Liberado!</h3>
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="endereco" placeholder="Endereço" required>
                <input type="text" id="servico_display" readonly>
                <textarea id="mensagem" placeholder="Detalhes..." rows="3"></textarea>
                <button type="submit" style="background: #25d366;">Enviar via WhatsApp 💬</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "https://probability-quizzes-cars-convention.trycloudflare.com";
        let idGerado = "";

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        async function abrirPix(servico) {
            idGerado = Math.floor(1000 + Math.random() * 9000).toString(); // Gera ID de 4 dígitos
            const pix = "00020126360014br.gov.bcb.pix0114+557398847817052040000530398654045.005802BR5921Lucas Emanuel Tavares6009Sao Paulo62230519daqr4913550667180526304C9B1";
            
            Swal.fire({
                title: 'Reserva',
                html: `<p>INFORME ESTE CÓDIGO:</p><span class="pedido-id-neon">#${idGerado}</span>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pix)}">
                <span class="pix-code">${pix}</span>`,
                allowOutsideClick: false, showConfirmButton: false
            });

            await fetch(`${API_BASE}/api/registrar-id`, { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({id_visto: idGerado, servico}) 
            });
            checarStatus(servico);
        }

        function checarStatus(servico) {
            const intv = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${idGerado}`);
                const d = await res.json();
                if(d.status === 'liberado') {
                    clearInterval(intv); Swal.close();
                    document.getElementById('form-container').style.display = 'block';
                    document.getElementById('servico_display').value = servico;
                }
            }, 3000);
        }

        document.getElementById('formOrcamento').onsubmit = (e) => {
            e.preventDefault();
            const texto = `*Pedido #${idGerado}*%0A*Nome:* ${document.getElementById('nome').value}%0A*Endereço:* ${document.getElementById('endereco').value}`;
            window.open(`https://wa.me/5573988478170?text=${texto}`, '_blank');
        };
    </script>
</body>
</html>
