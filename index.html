<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <span style="font-weight: bold;">Encanador Pro</span>
    </div>

    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="historico.html">Histórico</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container">
        <h1 style="text-align: center;">🛠️ Nossos Serviços</h1>
        
        <div class="servicos-destaque">
            <div class="circulo-servico" onclick="abrirPix('Vazamento')">
                <div class="icone-bola">💧</div>
                <span style="font-size: 12px; font-weight: bold; color: #0056b3;">Vazamento</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Reparo')">
                <div class="icone-bola">🛠️</div>
                <span style="font-size: 12px; font-weight: bold; color: #0056b3;">Reparo</span>
            </div>
            <div class="circulo-servico" onclick="abrirPix('Desentupimento')">
                <div class="icone-bola">🚽</div>
                <span style="font-size: 12px; font-weight: bold; color: #0056b3;">Desentupimento</span>
            </div>
        </div>

        <div id="form-container">
            <form id="formOrcamento">
                <h3 style="color: #28a745; text-align: center; margin-bottom: 10px;">✅ Pagamento Validado!</h3>
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="text" id="endereco" placeholder="Endereço Completo" required>
                <input type="text" id="servico_display" readonly>
                <textarea id="mensagem" placeholder="Detalhes do problema..." rows="3"></textarea>
                <button type="submit">Enviar Solicitação Final</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "https://weights-brothers-first-bristol.trycloudflare.com";
        let idSessao = "";

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        async function abrirPix(servico) {
            const idPedidoAleatorio = Math.floor(1000 + Math.random() * 9000);
            const pix = "00020126360014br.gov.bcb.pix0114+557398847817052040000530398654045.005802BR5921Lucas Emanuel Tavares6009Sao Paulo62230519daqr4913550667180526304C9B1";
            
            Swal.fire({
                title: 'Reserva de Atendimento',
                html: `
                    <p>ID DO PEDIDO:</p>
                    <span class="pedido-id-neon">#${idPedidoAleatorio}</span>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pix)}" style="margin-bottom:10px; border: 2px solid #00f2ff; border-radius: 10px;">
                    <span class="pix-code" id="pixTxt">${pix}</span>
                    <button onclick="navigator.clipboard.writeText('${pix}'); alert('Código Copiado!')" style="background:#00f2ff; color:#000; border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer; margin-bottom:10px;">Copiar Pix</button>
                    <input id="swal-input-cod" class="swal2-input" placeholder="Cole o código do comprovante">
                `,
                confirmButtonText: 'Validar Agora',
                showCancelButton: true,
                preConfirm: () => document.getElementById('swal-input-cod').value
            }).then(async (r) => {
                if(r.isConfirmed && r.value) {
                    const res = await fetch(`${API_BASE}/api/verificar-pix`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({codigo: r.value, servico, id_visto: idPedidoAleatorio}) 
                    });
                    const d = await res.json();
                    idSessao = d.id;
                    
                    Swal.fire({ title: 'Validando...', html: `Aguardando Admin para o Pedido <b>#${idPedidoAleatorio}</b>`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    checarStatus(servico);
                }
            });
        }

        function checarStatus(servico) {
            const intv = setInterval(async () => {
                const res = await fetch(`${API_BASE}/api/status/${idSessao}`);
                const d = await res.json();
                if(d.status === 'liberado') {
                    clearInterval(intv);
                    Swal.close();
                    document.getElementById('form-container').style.display = 'block';
                    document.getElementById('servico_display').value = servico;
                    document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
                }
            }, 3000);
        }

        document.getElementById('formOrcamento').onsubmit = async (e) => {
            e.preventDefault();
            const dados = { id_sessao: idSessao, nome: document.getElementById('nome').value, endereco: document.getElementById('endereco').value, mensagem: document.getElementById('mensagem').value };
            await fetch(`${API_BASE}/orcamento`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dados) });
            Swal.fire('Sucesso!', 'Seu pedido foi enviado.', 'success').then(() => location.reload());
        };
    </script>
</body>
</html>
