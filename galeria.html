<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="header"><span class="menu-icon" onclick="toggleNav()">&#9776;</span><b>Nossa Galeria</b></div>
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <div id="fotos-container" class="galeria-grid"></div>
        <button onclick="document.getElementById('fileInput').click()" style="margin-top:20px;">ENVIAR MINHA FOTO 📸</button>
        <input type="file" id="fileInput" style="display:none" onchange="subirFoto(this)">
    </div>

    <script>
        const API = "http://localhost:3000";
        function toggleNav() { const s = document.getElementById("mySidebar"); s.style.width = s.style.width === "250px" ? "0" : "250px"; }

        async function carregarGaleria() {
            const res = await fetch(`${API}/api/galeria`);
            const fotos = await res.json();
            document.getElementById('fotos-container').innerHTML = fotos.map(f => `<img src="${API}/fotos/${f}">`).join('');
        }

        async function subirFoto(input) {
            if(!input.files[0]) return;
            Swal.fire({ title: 'Enviando...', didOpen: () => Swal.showLoading() });
            const fd = new FormData(); fd.append('foto', input.files[0]);
            try {
                await fetch(`${API}/api/upload-galeria`, { method:'POST', body:fd });
                Swal.fire('Sucesso!', 'Sua foto foi enviada para moderação.', 'success');
            } catch(e) { Swal.fire('Erro', 'Falha no upload', 'error'); }
        }
        carregarGaleria();
    </script>
</body>
</html>
