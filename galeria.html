<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Serviços - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Estilos específicos para a Grade da Galeria */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .foto-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.3s ease;
            background: #eee;
        }

        .foto-item:hover {
            transform: scale(1.03);
        }

        .foto-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botão de Enviar Foto */
        .btn-upload {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,123,255,0.3);
        }

        /* Título da seção */
        .secao-titulo-galeria {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <b>Galeria de Serviços</b>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" onclick="toggleNav()" class="close-btn">×</a>
        <a href="index.html">🏠 Início</a>
        <a href="historico.html">📋 Histórico</a>
        <a href="galeria.html">📸 Galeria</a>
        <a href="trabalhe-conosco.html">👷 Trabalhe Conosco</a>
        <a href="admin.html">🔐 Painel Admin</a>
    </div>

    <div class="container">
        <div class="secao-titulo-galeria">
            <h2>Nossos Trabalhos 🛠️</h2>
            <p style="font-size: 13px; color: #666;">Veja alguns dos serviços realizados em Itabuna</p>
        </div>

        <button class="btn-upload" onclick="triggerUpload()">
            <span>📷 Enviar Minha Foto</span>
        </button>
        <input type="file" id="input-foto" hidden accept="image/*" onchange="enviarFoto(this)">

        <div id="grid-fotos" class="galeria-grid">
            <p style="text-align:center; grid-column: 1/-1; padding: 20px;">Carregando galeria...</p>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000";

        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }

        // Função para abrir o seletor de arquivos
        function triggerUpload() {
            document.getElementById('input-foto').click();
        }

        // Função para carregar as fotos aprovadas do servidor
        async function carregarGaleria() {
            try {
                const res = await fetch(`${API}/api/galeria`);
                const fotos = await res.json();
                const container = document.getElementById('grid-fotos');

                if (fotos.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #999;">
                            <p>Nenhuma foto aprovada no momento.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = fotos.map(foto => `
                    <div class="foto-item" onclick="expandirFoto('${API}/fotos/${foto}')">
                        <img src="${API}/fotos/${foto}" alt="Serviço Encanador Pro">
                    </div>
                `).join('');

            } catch (e) {
                console.error("Erro ao carregar fotos:", e);
                document.getElementById('grid-fotos').innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Erro ao conectar com o servidor.</p>";
            }
        }

        // Função para enviar foto para aprovação
        async function enviarFoto(input) {
            if (!input.files[0]) return;

            const formData = new FormData();
            formData.append('foto', input.files[0]);

            Swal.fire({ title: 'Enviando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API}/api/upload-galeria`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Foto Enviada!',
                        text: 'Sua foto foi enviada para análise e em breve aparecerá na galeria.',
                        confirmButtonColor: '#007bff'
                    });
                }
            } catch (e) {
                Swal.fire('Erro', 'Não foi possível enviar a foto.', 'error');
            }
            input.value = ""; // Limpa o input
        }

        // Função para ver a foto maior (Lightbox)
        function expandirFoto(url) {
            Swal.fire({
                imageUrl: url,
                imageAlt: 'Serviço Realizado',
                showCloseButton: true,
                showConfirmButton: false,
                background: 'rgba(0,0,0,0.9)',
                backdrop: `rgba(0,0,123,0.4)`
            });
        }

        // Iniciar
        window.onload = carregarGaleria;
    </script>
</body>
</html>
