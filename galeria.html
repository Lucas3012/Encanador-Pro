<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container" style="max-width: 1000px;">
        <h1>📸 Nossa Galeria</h1>
        <p style="text-align:center">Confira fotos reais dos nossos últimos atendimentos.</p>
        <div class="grid" id="lista-fotos">
            </div>
    </div>

    <script>
        const API_BASE = "https://albums-speaks-notes-fired.trycloudflare.com";
        async function carregarGaleria() {
            const container = document.getElementById('lista-fotos');
            try {
                const res = await fetch(`${API_BASE}/api/fotos`);
                const fotos = await res.json();
                if(fotos.length === 0) {
                    container.innerHTML = "<p style='grid-column: 1/-1'>Nenhuma foto disponível no momento.</p>";
                    return;
                }
                container.innerHTML = fotos.map(f => `
                    <div class="card">
                        <img src="${API_BASE}/galeria/${f}" onclick="window.open(this.src)">
                        <p>Serviço Realizado</p>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = "<p>Erro ao carregar fotos.</p>"; }
        }
        carregarGaleria();
    </script>
</body>
</html>
