<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="menu-icon" onclick="toggleNav()">&#9776;</span>
        <span>Nossa Galeria</span>
    </div>
    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="historico.html">Histórico</a>
        <a href="admin.html">Admin</a>
    </div>

    <div class="container">
        <h1>📸 Serviços Realizados</h1>
        <div class="grid" id="lista"></div>
    </div>

    <label class="upload-float" for="input-foto">+</label>
    <input type="file" id="input-foto" style="display:none" accept="image/*" onchange="enviarFoto(this)">

    <a href="https://wa.me/5573988478170" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    </a>

    <script>
        const API_BASE = "https://toolbar-bodies-isolation-gorgeous.trycloudflare.com";
        function toggleNav() {
            const s = document.getElementById("mySidebar");
            s.style.width = s.style.width === "250px" ? "0" : "250px";
        }
        async function carregar() {
            const res = await fetch(`${API_BASE}/api/fotos`);
            const fotos = await res.json();
            document.getElementById('lista').innerHTML = fotos.map(f => `
                <div class="card"><img src="${API_BASE}/galeria/${f}"><p>Concluído</p></div>
            `).join('');
        }
        async function enviarFoto(input) {
            const formData = new FormData();
            formData.append('foto', input.files[0]);
            await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
            alert("Enviada para aprovação!");
        }
        carregar();
    </script>
</body>
</html>
