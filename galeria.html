<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Encanador Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="trabalhe-conosco.html">Trabalhe Conosco</a>
        <a href="admin.html">Painel Admin</a>
    </div>

    <div class="container">
        <h1>📸 Nossos Serviços</h1>
        <div class="grid" id="lista-fotos"></div>
    </div>

    <a href="https://wa.me/5573988478170" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <script>
        const API_BASE = "https://clinton-travelling-monthly-term.trycloudflare.com";
        async function carregar() {
            const res = await fetch(`${API_BASE}/api/fotos`);
            const fotos = await res.json();
            document.getElementById('lista-fotos').innerHTML = fotos.map(f => `
                <div class="card"><img src="${API_BASE}/galeria/${f}"><p>Serviço Realizado</p></div>
            `).join('');
        }
        carregar();
    </script>
</body>
</html>
